<body class="bg-surface text-on-surface min-h-screen flex flex-col md:flex-row antialiased selection:bg-tertiary-container selection:text-on-tertiary">
<!-- TopNavBar for Mobile Only (Suppressed on Desktop for pure split screen, visible on mobile as it's a login screen but we need brand context if no image) -->
<nav class="md:hidden flex justify-between items-center w-full px-gutter py-gutter border-b border-primary dark:border-outline-variant bg-surface sticky top-0 z-50">
<div class="font-display-lg text-headline-lg-mobile text-primary italic tracking-tight">GoPilot</div>
<div class="font-ui-label text-ui-label text-primary">SECURE ACCESS</div>
</nav>
<!-- Left Side: Brand Panel (Hidden on mobile to prioritize form) -->
<div class="hidden md:flex md:w-1/2 relative bg-primary-container flex-col justify-end p-margin-edge overflow-hidden">
<!-- Background Image -->
<div class="absolute inset-0 z-0">
<img alt="A high-contrast, black and white close-up of premium perforated leather stitching inside a luxury vehicle. The lighting is dramatic and cinematic, emphasizing the texture and precise craftsmanship. The mood is exclusive, sophisticated, and aligns with a high-end editorial aesthetic. Deep shadows contrast sharply with crisp highlights on the pristine materials." class="w-full h-full object-cover opacity-80 mix-blend-luminosity" data-alt="A high-contrast, black and white close-up of premium perforated leather stitching inside a luxury vehicle. The lighting is dramatic and cinematic, emphasizing the texture and precise craftsmanship. The mood is exclusive, sophisticated, and aligns with a high-end editorial aesthetic. Deep shadows contrast sharply with crisp highlights on the pristine materials." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0mfnmi32c5xegBoyiazoUiv9ZEbR9gSY93vpIFaLISLA8JlKnBjAtO9NOKv04e4pcHBi0gKVHBtUh0Np7IMAlkgO5rATUtKkYTVAvQL1hlfxpCG1Md-ll54Hq1calSH2sSU3dMyT0tN7b1JQIk29WjuLlks8kIQczuxOaxLmc24pL7zl1mVlz82KhiUYQigvCrIgob93cCG8f3uBgUTMOpJkRYkyqUUMTrqTw-sPfZzFCm5v0miIjIh7Kx9aWJLGbKMhvHJXdbEI"/>
</div>
<!-- Overlay Gradient for text readability -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-primary-container via-transparent to-transparent opacity-90"></div>
<!-- Content -->
<div class="relative z-20 text-on-primary">
<div class="mb-gutter flex items-center space-x-2">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-ui-label text-ui-label tracking-widest uppercase opacity-70">Private Classified</span>
</div>
<h1 class="font-display-lg text-display-lg mb-6 leading-none italic max-w-lg">THE GATEWAY TO PRECISION</h1>
<p class="font-body-lg text-body-lg opacity-80 max-w-md border-l border-on-primary pl-4">Elite Logistical Choreography.</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 flex items-center justify-center p-gutter md:p-margin-edge bg-surface relative min-h-[calc(100vh-80px)] md:min-h-screen">
<!-- Desktop Brand Marker (Subtle) -->
<div class="hidden md:block absolute top-margin-edge left-margin-edge font-display-lg text-headline-lg-mobile text-primary italic tracking-tight opacity-20 pointer-events-none">
            GoPilot
        </div>
<div class="w-full max-w-md relative z-10">
<!-- Form Header -->
<div class="mb-16">
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-4">SIGN IN</h2>
<div class="w-16 h-px bg-primary"></div>
</div>
<!-- Form -->
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="relative group">
<label class="block font-ui-label text-ui-label uppercase text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body-md text-body-md text-primary placeholder-outline transition-colors" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="relative group">
<label class="block font-ui-label text-ui-label uppercase text-on-surface-variant mb-2 transition-colors group-focus-within:text-primary" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body-md text-body-md text-primary placeholder-outline transition-colors" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
<!-- Utility Row -->
<div class="flex items-center justify-between pt-4">
<div class="flex items-center">
<input class="h-4 w-4 rounded-none border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface bg-transparent cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block font-ui-label text-ui-label uppercase text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember Me
                        </label>
</div>
<div class="text-sm">
<a class="font-ui-label text-ui-label uppercase text-primary hover:text-tertiary-container transition-colors border-b border-transparent hover:border-tertiary-container pb-0.5" href="#">
                            Forgot Password?
                        </a>
</div>
</div>
<!-- Actions -->
<div class="pt-8 space-y-6">
<button class="w-full flex justify-center py-4 px-8 border border-transparent font-ui-button text-ui-button uppercase text-on-primary bg-primary hover:bg-tertiary-container hover:text-on-tertiary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300" type="submit">
                        SIGN IN
                    </button>
<div class="text-center pt-8 border-t border-outline-variant/30">
<a class="font-ui-label text-ui-label uppercase text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center space-x-2 group" href="#">
<span>Apply for a Pilot Account</span>
<span class="material-symbols-outlined text-[16px] transform group-hover:translate-x-1 transition-transform">arrow_forward</span>
</a>
</div>
</div>
</form>
</div>
</div>
</body></html>
